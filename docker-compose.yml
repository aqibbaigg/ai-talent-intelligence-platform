version: "3.9"

services:
  # ── PostgreSQL database ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: talentiq_db
    restart: always
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       talent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ─────────────────────────────────────────
  app:
    build: .
    container_name: talentiq_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:      postgresql+asyncpg://postgres:password@db:5432/talent_db
      DATABASE_SYNC_URL: postgresql://postgres:password@db:5432/talent_db
      APP_NAME:          "AI Talent Intelligence Platform"
      APP_VERSION:       "1.0.0"
      DEBUG:             "false"
      SECRET_KEY:        "change-this-to-a-random-secret-key-in-production"
      EMBEDDING_MODEL:   all-MiniLM-L6-v2
      EMBEDDING_DIM:     "384"
      MAX_FILE_SIZE_MB:  "10"
      UPLOAD_DIR:        uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data: